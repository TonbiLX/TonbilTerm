; TermostatOtonom -- ESP8266 Relay Firmware
; Kombi relay kontrolu, MQTT ile merkeze bagli, yerel fallback destekli

[env:esp8266]
platform = espressif8266
board = nodemcuv2
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; OTA icin
upload_protocol = espota
upload_port = relay-XXXX.local

lib_deps =
    knolleary/PubSubClient@^2.8
    adafruit/Adafruit BME280 Library@^2.2.4
    bblanchon/ArduinoJson@^7.0.0
    tzapu/WiFiManager@^2.0.17

build_flags =
    -DARDUINOJSON_ENABLE_COMMENTS=0

; USB uzerinden yukleme icin override
[env:esp8266-serial]
extends = env:esp8266
upload_protocol = esptool
upload_port = COM8
