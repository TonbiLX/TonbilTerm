; TermostatOtonom -- ESP8266 Sensor Firmware
; BME280 sicaklik/nem/basinc sensoru, MQTT ile merkeze rapor

[env:esp8266]
platform = espressif8266
board = nodemcuv2
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; OTA icin
upload_protocol = espota
upload_port = sensor-XXXX.local

lib_deps =
    knolleary/PubSubClient@^2.8
    adafruit/Adafruit BME280 Library@^2.2.4
    adafruit/Adafruit BMP280 Library@^2.6.8
    bblanchon/ArduinoJson@^7.0.0
    tzapu/WiFiManager@^2.0.17

build_flags =
    -DARDUINOJSON_ENABLE_COMMENTS=0
    ; WiFi hardcode: uncomment and set for headless provisioning
    ; '-DWIFI_SSID="YOUR_SSID"'
    ; '-DWIFI_PASS="YOUR_PASS"'

; USB uzerinden yukleme icin override
[env:esp8266-serial]
extends = env:esp8266
upload_protocol = esptool
upload_port = COM12
