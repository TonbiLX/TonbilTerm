# ===========================================================================
# Tonbil Termostat - Mosquitto MQTT Broker Configuration
# ===========================================================================

# --- Genel ---
per_listener_settings false
persistence true
persistence_location /mosquitto/data/
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
connection_messages true

# --- MQTT TCP Listener (ESP32 cihazlar icin) ---
listener 1883
protocol mqtt

# --- WebSocket Listener (Tarayici icin, nginx proxy arkasinda) ---
listener 9001
protocol websockets

# --- Kimlik Dogrulama ---
allow_anonymous false
password_file /mosquitto/dynamic/passwd
acl_file /mosquitto/dynamic/acl

# --- Performans ---
max_connections -1
max_inflight_messages 20
max_queued_messages 1000
message_size_limit 8192

# --- Keepalive ---
max_keepalive 120
